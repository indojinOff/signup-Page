<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <style>
        body {
            background-color: #f4f4f4;
            color: #333;
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }
        label {
            padding: 5px 0;
            margin: 0;
            display: block;
            margin-bottom: 5px;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
    <h1>Login Page</h1>
    <p>Welcome to the login page.</p>
    <form>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" id="" placeholder="Enter your email" required><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" id="" placeholder="Enter your password" required><br>
       <input type="submit" value="Login">
    </form>
</body>
</html>
