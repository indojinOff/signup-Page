<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f0f2f5;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      background-color: #e8f0fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 24px;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .card-header p {
      font-size: 13px;
      color: #6b7280;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      color: #1a1a2e;
      background-color: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="date"]:focus,
    input[type="password"]:focus,
    input[type="tel"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      background-color: #fff;
    }

    input::placeholder {
      color: #b0b7c3;
      font-size: 13px;
    }

    .divider {
      border: none;
      border-top: 1px solid #f3f4f6;
      margin: 20px 0;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s, transform 0.1s;
    }

    input[type="submit"]:hover {
      background-color: #4338ca;
    }

    input[type="submit"]:active {
      transform: scale(0.98);
    }

    .signin-link {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 18px;
    }

    .signin-link a {
      color: #4f46e5;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="avatar">👤</div>
      <h1>Create an account</h1>
      <p>Fill in the details below to get started</p>
    </div>

    <form>
      <div class="row">
        <div class="form-group">
          <label for="name">First name</label>
          <input type="text" id="name" name="name" placeholder="Shresth" required>
        </div>
        <div class="form-group">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" placeholder="saxena" required>
        </div>
      </div>

      <div class="form-group">
        <label for="number">Phone number</label>
        <input type="tel" id="number" name="number" placeholder="+1234567890" required>
      </div>

      <div class="form-group">
        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob" required>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="shresth@email.com" required>
      </div>

      <hr class="divider">

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
      </div>

      <input type="submit" value="Create account">
    </form>

    <p class="signin-link">Already have an account? <a href="#">Sign in</a></p>
  </div>

</body>
</html>
